<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniThrift | Updates</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* GLOBAL & RESET */
        *, *::before, *::after { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* =========================================
           THEMES (Matched to Marketplace)
        ========================================= */
        body.dark-theme {
            --bg: #050505;               /* True pure black canvas */
            --card: #121214;             /* Slate-tinted ultra-dark charcoal */
            --card-hover: #1a1a1e;       /* Crisper elevation state */
            --text: #f3f4f6;             /* Clean premium off-white */
            --secondary: #8e939e;        /* Balanced muted text */
            --accent: #6366f1;           /* Vibrant Indigo */
            --accent-hover: #4f46e5;
            --navbar: rgba(5, 5, 5, 0.85); /* Frosty pure black sticky nav */
            --border: rgba(255, 255, 255, 0.07); /* Razor-thin premium border */
            --shadow: rgba(0, 0, 0, 0.6);

            /* High visibility Notification Category Colors */
            --sale: #10b981; 
            --message: #6366f1; 
            --offer: #f59e0b;
            --system: #22d3ee; 
            --info: #94a3b8;
        }

        body.light-theme {
            --bg: #f8f5ff;                       /* Soft lavender tint canvas */
            --card: rgba(255, 255, 255, 0.42);   /* Glassmorphism translucent card */
            --card-hover: rgba(255, 255, 255, 0.75); /* Elevated glass state */
            --text: #2f2545;                     /* Deep purple charcoal text */
            --secondary: #6d6486;                /* Muted lavender purple */
            --accent: #8b5cf6;                   /* Primary purple */
            --accent-hover: #7c3aed;             
            --navbar: rgba(255, 255, 255, 0.45); /* Soft frosty lavender glass navigation */
            --border: rgba(170, 150, 255, 0.25); /* Gentle amethyst line boundary */
            --shadow: rgba(88, 62, 175, 0.12);   

            /* High visibility Notification Category Colors (Light) */
            --sale: #059669; 
            --message: #7c3aed; 
            --offer: #d97706;
            --system: #0891b2; 
            --info: #4b5563;
        }

        body { 
            background: var(--bg); 
            color: var(--text); 
            min-height: 100vh; 
            font-family: 'Poppins', sans-serif; 
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* GLASSMORPHISM ENHANCEMENTS FOR LIGHT THEME */
        body.light-theme .navbar,
        body.light-theme .notif-card,
        body.light-theme .skeleton {
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            box-shadow: 0 20px 50px var(--shadow), inset 0 1px 0 rgba(255, 255, 255, 0.65);
        }

        /* =========================================
           NAVBAR (Matched to Marketplace)
        ========================================= */
        .navbar {
            position: sticky; 
            top: 0; 
            z-index: 1000;
            display: flex; 
            align-items: center; 
            justify-content: flex-start; 
            padding: 16px 5%; 
            height: 70px;
            background: var(--navbar); 
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            gap: 40px; 
        }
        
        .logo { 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            font-size: 1.4rem; 
            font-weight: 700; 
            letter-spacing: -0.5px;
            color: var(--text); 
            text-decoration: none; 
            flex-shrink: 0;
        }
        
        .logo-mark { 
            width: 34px; 
            height: 34px; 
            border-radius: 10px; 
            background: linear-gradient(135deg, var(--accent), #a78bfa); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: white; 
            font-size: 0.9rem; 
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.35);
        }

        .nav-center { 
            display: flex; 
            align-items: center;
            gap: 24px; 
        }
        .nav-center a { text-decoration: none; color: var(--secondary); font-size: 0.95rem; font-weight: 500; transition: color 0.2s; }
        .nav-center a:hover, .nav-center a.active { color: var(--text); }
        
        .theme-inline-toggle {
            background: none;
            border: none;
            color: var(--secondary);
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px 8px;
            border-radius: 8px;
            transition: color 0.2s, background-color 0.2s;
        }
        .theme-inline-toggle:hover {
            color: var(--text);
            background-color: var(--border);
        }

        body.dark-theme .theme-inline-toggle .fa-sun { display: block; }
        body.dark-theme .theme-inline-toggle .fa-moon { display: none; }
        body.light-theme .theme-inline-toggle .fa-sun { display: none; }
        body.light-theme .theme-inline-toggle .fa-moon { display: block; }

        .nav-right { 
            display: flex; 
            align-items: center; 
            gap: 14px; 
            margin-left: auto; 
        }
        
        .icon-btn {
            width: 44px;
            height: 44px;
            border: 1px solid var(--border);
            cursor: pointer;
            border-radius: 14px;
            background: var(--card);
            color: var(--text);
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .icon-btn:hover {
            background: var(--card-hover);
            border-color: var(--accent);
            color: var(--accent);
            transform: translateY(-2px);
        }

        .nav-avatar { width: 38px; height: 38px; border-radius: 50%; overflow: hidden; border: 2px solid var(--accent); cursor: pointer; }
        .nav-avatar img { width: 100%; height: 100%; object-fit: cover; }

        /* =========================================
           PAGE LAYOUT
        ========================================= */
        .page-wrap { max-width: 800px; margin: 50px auto; padding: 0 4%; }

        .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 35px; }
        .page-header h1 { font-size: 1.8rem; font-weight: 700; display: flex; align-items: center; gap: 12px; letter-spacing: -0.5px; }
        .page-header h1 i { color: var(--accent); }

        .btn { display: inline-flex; align-items: center; gap: 8px; padding: 12px 22px; border-radius: 12px; font-size: 0.88rem; font-weight: 600; cursor: pointer; border: none; transition: all 0.25s ease; }
        .btn-outline { background: var(--card); border: 1px solid var(--border); color: var(--text); }
        .btn-outline:hover { background: var(--card-hover); border-color: var(--accent); color: var(--accent); transform: translateY(-2px); }

        .unread-badge {
            background: var(--accent); color: white; font-size: 0.75rem; font-weight: 700;
            padding: 3px 9px; border-radius: 12px; min-width: 24px; text-align: center;
            box-shadow: 0 4px 10px rgba(99, 102, 241, 0.4);
        }

        /* FILTER TABS */
        .filter-tabs { display: flex; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; }
        .tab-btn {
            padding: 8px 18px; border-radius: 25px; font-size: 0.85rem; font-weight: 500;
            border: 1px solid var(--border); background: var(--card); color: var(--secondary);
            cursor: pointer; transition: all 0.2s ease;
        }
        .tab-btn.active { background: var(--accent); border-color: var(--accent); color: white; box-shadow: 0 4px 12px rgba(139, 92, 246, 0.35); }
        .tab-btn:hover:not(.active) { border-color: var(--accent); color: var(--text); background: var(--card-hover); }

        /* NOTIFICATION LIST COMPONENTS */
        #notifList { display: flex; flex-direction: column; gap: 14px; }

        .notif-card {
            display: flex; align-items: flex-start; gap: 16px;
            background: var(--card); border: 1px solid var(--border);
            border-radius: 18px; padding: 20px;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer; position: relative;
            box-shadow: 0 4px 12px var(--shadow);
        }
        .notif-card.unread { border-left: 4px solid var(--accent); }
        .notif-card:hover { border-color: var(--accent); background: var(--card-hover); transform: translateY(-2px); }
        .notif-card.read { opacity: 0.65; }

        .notif-icon {
            width: 44px; height: 44px; border-radius: 14px; display: flex;
            align-items: center; justify-content: center; font-size: 1.1rem; flex: none;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        body.light-theme .notif-icon { border: 1px solid rgba(0, 0, 0, 0.05); }

        .notif-icon.sale    { background: rgba(16, 185, 129, 0.15); color: var(--sale); }
        .notif-icon.message { background: rgba(99, 102, 241, 0.15); color: var(--message); }
        .notif-icon.offer   { background: rgba(245, 158, 11, 0.15); color: var(--offer); }
        .notif-icon.system  { background: rgba(34, 211, 238, 0.15); color: var(--system); }
        .notif-icon.info    { background: rgba(148, 163, 184, 0.15); color: var(--info); }

        .notif-body { flex: 1; padding-top: 2px; }
        .notif-body p { font-size: 0.95rem; line-height: 1.5; color: var(--text); }
        .notif-body .notif-time { font-size: 0.8rem; color: var(--secondary); margin-top: 6px; display: block; }

        .notif-unread-dot {
            width: 10px; height: 10px; border-radius: 50%;
            background: var(--accent); flex: none; margin-top: 8px;
            box-shadow: 0 0 10px var(--accent);
        }

        /* EMPTY STATE */
        .empty-state {
            text-align: center; padding: 80px 20px; color: var(--secondary);
        }
        .empty-state i { font-size: 3rem; display: block; margin-bottom: 18px; opacity: 0.35; color: var(--secondary); }
        .empty-state p { font-size: 0.95rem; }

        /* SKELETON PLACEHOLDERS */
        .skeleton {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 18px; padding: 20px;
            display: flex; gap: 16px; align-items: center;
            box-shadow: 0 4px 12px var(--shadow);
        }
        .skel-icon { width: 44px; height: 44px; border-radius: 14px; background: var(--border); flex: none; animation: pulse 1.4s infinite; }
        .skel-lines { flex: 1; display: flex; flex-direction: column; gap: 10px; }
        .skel-line { height: 14px; border-radius: 6px; background: var(--border); animation: pulse 1.4s infinite; }
        .skel-line.short { width: 40%; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.45; } }

        @media(max-width: 768px) {
            .navbar { padding: 0 4%; gap: 15px; }
            .nav-center { display: none; }
            .page-wrap { margin: 30px auto; }
            .page-header h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body class="dark-theme">

<nav class="navbar">
    <a href="/marketplace" class="logo">
        <span class="logo-mark"><i class="fas fa-bag-shopping"></i></span>
        UniThrift
    </a>
    <div class="nav-center">
        <a href="/marketplace">Browse</a>
        <!-- Light / Dark toggle element embedded right after Browse link -->
        <button class="theme-inline-toggle" id="themeToggleBtn" title="Toggle Theme">
            <i class="fas fa-sun"></i>
            <i class="fas fa-moon"></i>
        </button>
        <a href="#">Deals</a>
        <a href="/updates" class="active">Updates</a>
    </div>
    <div class="nav-right">
        <button class="icon-btn" onclick="window.location.href='/profile'">
            <i class="fas fa-user"></i>
        </button>
        <div class="nav-avatar" onclick="window.location.href='/profile'">
            <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" id="navAvatar" alt="avatar">
        </div>
    </div>
</nav>

<div class="page-wrap">

    <div class="page-header">
        <h1>
            <i class="fas fa-bell"></i>
            Updates
            <span class="unread-badge" id="unreadCount" style="display:none;">0</span>
        </h1>
        <div class="header-actions">
            <button class="btn btn-outline" id="markAllReadBtn">
                <i class="fas fa-check-double"></i> Mark all read
            </button>
        </div>
    </div>

    <div class="filter-tabs">
        <button class="tab-btn active" data-filter="all">All</button>
        <button class="tab-btn" data-filter="message"><i class="fas fa-comment"></i> Messages</button>
        <button class="tab-btn" data-filter="sale"><i class="fas fa-tag"></i> Sales</button>
        <button class="tab-btn" data-filter="offer"><i class="fas fa-hand-holding-dollar"></i> Offers</button>
        <button class="tab-btn" data-filter="system"><i class="fas fa-gear"></i> System</button>
    </div>

    <div id="notifList">
        <div class="skeleton"><div class="skel-icon"></div><div class="skel-lines"><div class="skel-line"></div><div class="skel-line short"></div></div></div>
        <div class="skeleton"><div class="skel-icon"></div><div class="skel-lines"><div class="skel-line"></div><div class="skel-line short"></div></div></div>
        <div class="skeleton"><div class="skel-icon"></div><div class="skel-lines"><div class="skel-line"></div><div class="skel-line short"></div></div></div>
    </div>

</div>

<script src="/js/auth-fetch.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script>
(async function() {
    // Initial Sync of Theme
    const savedTheme = localStorage.getItem('theme') || 'dark-theme';
    document.body.className = savedTheme;

    // Underlying theme handler context setup
    document.getElementById('themeToggleBtn').addEventListener('click', () => {
        const currentTheme = document.body.className;
        const targetTheme = currentTheme === 'dark-theme' ? 'light-theme' : 'dark-theme';
        document.body.className = targetTheme;
        localStorage.setItem('theme', targetTheme);
    });

    const SUPABASE_URL = window.__SUPABASE_URL__ || '';
    const SUPABASE_KEY = window.__SUPABASE_ANON__ || '';

    let allNotifications = [];
    let currentFilter    = 'all';
    const list           = document.getElementById('notifList');
    const unreadBadge    = document.getElementById('unreadCount');

    const ICONS = {
        sale:    'fas fa-tag',
        message: 'fas fa-comment',
        offer:   'fas fa-hand-holding-dollar',
        system:  'fas fa-gear',
        info:    'fas fa-circle-info'
    };

    function timeAgo(dateStr) {
        const diff = (Date.now() - new Date(dateStr)) / 1000;
        if (diff < 60)   return 'just now';
        if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
        if (diff < 86400)return `${Math.floor(diff / 3600)}h ago`;
        return `${Math.floor(diff / 86400)}d ago`;
    }

    function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = String(str ?? '');
        return div.innerHTML;
    }

    function renderCard(n) {
        const type = n.type || 'info';
        const icon = ICONS[type] || ICONS.info;
        return `
        <div class="notif-card ${n.read ? 'read' : 'unread'}" data-id="${n.id}" data-type="${type}" data-ref="${n.reference_id || ''}">
            <div class="notif-icon ${type}"><i class="${icon}"></i></div>
            <div class="notif-body">
                <p>${escapeHtml(n.message)}</p>
                <span class="notif-time">${timeAgo(n.created_at)}</span>
            </div>
            ${!n.read ? '<div class="notif-unread-dot"></div>' : ''}
        </div>`;
    }

    function renderList() {
        const filtered = currentFilter === 'all'
            ? allNotifications
            : allNotifications.filter(n => n.type === currentFilter);

        if (!filtered.length) {
            list.innerHTML = `<div class="empty-state">
                <i class="fas fa-bell-slash"></i>
                <p>No ${currentFilter === 'all' ? '' : currentFilter + ' '}notifications yet.</p>
            </div>`;
            return;
        }
        list.innerHTML = filtered.map(renderCard).join('');

        list.querySelectorAll('.notif-card').forEach(card => {
            card.addEventListener('click', async () => {
                const id  = card.getAttribute('data-id');
                const ref = card.getAttribute('data-ref');
                const tp  = card.getAttribute('data-type');

                if (card.classList.contains('unread')) {
                    if (id !== 'live-broadcast') {
                        await authFetch(`/api/notifications/${id}/read`, { method: 'POST' });
                    }
                    card.classList.remove('unread');
                    card.classList.add('read');
                    card.querySelector('.notif-unread-dot')?.remove();
                    const n = allNotifications.find(x => x.id === id);
                    if (n) n.read = true;
                    updateBadge();
                }

                if (tp === 'message' && ref) window.location.href = `/chat?room=${ref}`;
                else if ((tp === 'sale' || tp === 'offer') && ref) window.location.href = `/product?id=${ref}`;
            });
        });
    }

    function updateBadge() {
        const count = allNotifications.filter(n => !n.read).length;
        if (count > 0) {
            unreadBadge.textContent = count > 99 ? '99+' : count;
            unreadBadge.style.display = 'inline-block';
        } else {
            unreadBadge.style.display = 'none';
        }
    }

    async function loadNotifications() {
        try {
            const res    = await authFetch('/api/notifications');
            const result = await res.json();
            if (!result.success) throw new Error(result.message);
            allNotifications = result.notifications || [];
            renderList();
            updateBadge();
        } catch (err) {
            list.innerHTML = `<div class="empty-state"><i class="fas fa-triangle-exclamation"></i><p>${err.message}</p></div>`;
        }
    }

    document.getElementById('markAllReadBtn').addEventListener('click', async () => {
        await authFetch('/api/notifications/read-all', { method: 'POST' });
        allNotifications.forEach(n => { n.read = true; });
        renderList();
        updateBadge();
    });

    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = btn.getAttribute('data-filter');
            renderList();
        });
    });

    if (SUPABASE_URL && SUPABASE_KEY) {
        const { createClient } = supabase;
        const sb   = createClient(SUPABASE_URL, SUPABASE_KEY);
        const token = localStorage.getItem('unithrift_session_token');
        if (token) {
            await sb.auth.setSession({
                access_token:  token,
                refresh_token: localStorage.getItem('unithrift_refresh_token') || ''
            });
            
            let activeUserId = null;
            try {
                const profileRes = await fetch('/api/profile', { headers: { 'Authorization': `Bearer ${token}` } });
                const profileData = await profileRes.json();
                if (profileData.success) {
                    activeUserId = profileData.profile?.id;
                }
            } catch (err) {
                console.error("Profile database extraction exception context:", err);
            }

            const userId = activeUserId || (await sb.auth.getUser()).data?.user?.id;
            if (userId) {
                sb.channel('notifications')
                  .on('postgres_changes', {
                      event: 'INSERT', schema: 'public', table: 'notifications',
                      filter: `user_id=eq.${userId}`
                  }, payload => {
                      allNotifications.unshift(payload.new);
                      renderList();
                      updateBadge();
                  })
                  .subscribe();

                const broadcastChannel = sb.channel(`notifications:${userId}`);
                broadcastChannel
                  .on('broadcast', { event: 'new_msg_alert' }, (payload) => {
                      const incomingMsg = payload.payload.msg;
                      const senderName = payload.payload.senderName || "Another Student";
                      const senderId = payload.payload.senderId || "";

                      const emptyState = list.querySelector('.empty-state');
                      if (emptyState) emptyState.remove();

                      // renderCard() escapes n.message before inserting into innerHTML,
                      // so building this string here is safe.
                      const syntheticNotif = {
                          id: 'live-broadcast',
                          type: 'message',
                          message: `New message from ${senderName}: "${incomingMsg}"`,
                          read: false,
                          reference_id: senderId,
                          created_at: new Date().toISOString()
                      };

                      allNotifications.unshift(syntheticNotif);
                      renderList();
                      updateBadge();
                  })
                  .subscribe();
            }
        }
    }

    await loadNotifications();
})();
</script>
</body>
</html>
